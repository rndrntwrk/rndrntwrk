<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Programmable state rail</title>
  <desc id="desc">A refined infrastructure rail connecting attention, play, identity, routing, and settlement.</desc>
  <defs>
    <linearGradient id="rail" x1="120" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0969da"/>
      <stop offset=".46" stop-color="#1a7f37"/>
      <stop offset=".72" stop-color="#9a6700"/>
      <stop offset="1" stop-color="#0969da"/>
    </linearGradient>
    <linearGradient id="softRail" x1="120" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0969da" stop-opacity=".1"/>
      <stop offset=".5" stop-color="#1a7f37" stop-opacity=".3"/>
      <stop offset="1" stop-color="#0969da" stop-opacity=".1"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      letter-spacing: 0;
    }
    .fg { fill: #24292f; }
    .muted { fill: #57606a; }
    .hair { stroke: #d0d7de; }
    .soft { stroke: #8c959f; }
    .blue { fill: #0969da; stroke: #0969da; }
    .green { fill: #1a7f37; stroke: #1a7f37; }
    .gold { fill: #9a6700; stroke: #9a6700; }
    .line {
      fill: none;
      stroke-width: 1.25;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .dash { stroke-dasharray: 3 10; }
    .node {
      fill: #ffffff;
      stroke-width: 1.5;
    }
    @media (prefers-color-scheme: dark) {
      #rail stop:nth-child(1), #rail stop:nth-child(4) { stop-color: #58a6ff; }
      #rail stop:nth-child(2) { stop-color: #3fb950; }
      #rail stop:nth-child(3) { stop-color: #d29922; }
      #softRail stop:nth-child(1), #softRail stop:nth-child(3) { stop-color: #58a6ff; }
      #softRail stop:nth-child(2) { stop-color: #3fb950; }
      .fg { fill: #f0f6fc; }
      .muted { fill: #8b949e; }
      .hair { stroke: #30363d; }
      .soft { stroke: #6e7681; }
      .node { fill: #0d1117; }
      .blue { fill: #58a6ff; stroke: #58a6ff; }
      .green { fill: #3fb950; stroke: #3fb950; }
      .gold { fill: #d29922; stroke: #d29922; }
    }
  </style>

  <g transform="translate(76 44)">
    <text x="0" y="0" class="muted" font-size="12" font-weight="700">STATE RAIL</text>
    <text x="0" y="28" class="fg" font-size="24" font-weight="650">attention, play, identity, routing, settlement</text>
    <text x="0" y="53" class="muted" font-size="14">one loop for human media, agent operation, and value movement</text>
  </g>

  <g transform="translate(0 0)">
    <path d="M120 154H1080" class="line hair"/>
    <path d="M120 154H1080" class="line dash soft" opacity=".45"/>
    <path d="M120 202C300 240 464 238 600 202C736 166 900 164 1080 202" class="line hair"/>
    <path d="M120 202C300 240 464 238 600 202C736 166 900 164 1080 202" class="line" stroke="url(#rail)" stroke-width="2.4" stroke-dasharray="8 16">
      <animate attributeName="stroke-dashoffset" values="0;-192" dur="12s" repeatCount="indefinite"/>
    </path>
    <path d="M120 202C300 240 464 238 600 202C736 166 900 164 1080 202L1080 214C900 176 736 178 600 214C464 250 300 252 120 214Z" fill="url(#softRail)" opacity=".65"/>
  </g>

  <g>
    <circle cx="120" cy="154" r="7" class="node blue"/>
    <text x="120" y="131" text-anchor="middle" class="fg" font-size="15" font-weight="650">attention</text>
    <text x="120" y="178" text-anchor="middle" class="muted" font-size="12">signal</text>

    <circle cx="360" cy="154" r="7" class="node green"/>
    <text x="360" y="131" text-anchor="middle" class="fg" font-size="15" font-weight="650">play</text>
    <text x="360" y="178" text-anchor="middle" class="muted" font-size="12">participation</text>

    <line x1="600" y1="92" x2="600" y2="216" class="line hair"/>
    <circle cx="600" cy="154" r="9" class="node gold"/>
    <text x="600" y="80" text-anchor="middle" class="fg" font-size="16" font-weight="700">protocol state</text>
    <text x="600" y="131" text-anchor="middle" class="fg" font-size="15" font-weight="650">identity</text>
    <text x="600" y="178" text-anchor="middle" class="muted" font-size="12">memory</text>

    <circle cx="840" cy="154" r="7" class="node blue"/>
    <text x="840" y="131" text-anchor="middle" class="fg" font-size="15" font-weight="650">routing</text>
    <text x="840" y="178" text-anchor="middle" class="muted" font-size="12">value paths</text>

    <circle cx="1080" cy="154" r="7" class="node green"/>
    <text x="1080" y="131" text-anchor="middle" class="fg" font-size="15" font-weight="650">settlement</text>
    <text x="1080" y="178" text-anchor="middle" class="muted" font-size="12">closed loop</text>
  </g>

  <g>
    <circle cx="120" cy="202" r="4" class="blue">
      <animate attributeName="cx" values="120;360;600;840;1080" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="202;229;202;176;202" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <text x="120" y="252" class="muted" font-size="12">human media</text>
    <text x="600" y="252" text-anchor="middle" class="muted" font-size="12">agent operation</text>
    <text x="1080" y="252" text-anchor="end" class="muted" font-size="12">abundance rails</text>
  </g>
</svg>
